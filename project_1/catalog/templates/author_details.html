<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{{ author.first_name }} {{ author.last_name }}</title>
</head>
<body>
    <nav>
        <a href="/">Главная</a> |
        <a href="/courses/">Курсы</a> |
        <a href="/authors/">Авторы</a> |
        <a href="/info/">Info</a> |
    </nav>

    <h1>{{ author.first_name }} {{ author.last_name }}</h1>
    <p>{{ author.bio }}</p>

    <h2>Курсы автора</h2>
    {% if courses %}
        <ul>
            {% for course in courses %}
                <li><a href="/courses/{{ course.id }}/">{{ course.title }}</a></li>
            {% endfor %}
        </ul>
    {% else %}
        <p>У этого автора пока нет курсов.</p>
    {% endif %}

    <p><a href="/authors/">← Вернуться к списку авторов</a></p>
</body>
</html>
