{% extends 'base.html' %}

{% block title %}Добавление преподавателя{% endblock %}

{% block content %}
    <h2>Добавить нового преподавателя</h2>

    <section>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <p>
                <button type="submit">Добавить преподавателя</button>
            </p>
        </form>
    </section>

{% endblock %}
