{% extends 'base.html' %}

{% block title %}Добавление преподавателя{% endblock %}

{% block content %}
    <h2>Добавить нового преподавателя</h2>

    <section>
        <form method="post">
            {% csrf_token %}
            
            <h3>Основная информация</h3>
            {{ teacher_form.as_p }}
            
            <h3>Дополнительная информация</h3>
            {{ info_form.as_p }}
            
            <p>
                <button type="submit">Добавить преподавателя</button>
            </p>
        </form>
    </section>

{% endblock %}
